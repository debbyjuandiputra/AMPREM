name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Beri izin eksekusi ke gradlew
      run: chmod +x gradlew

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Cek apakah APK berhasil dibuat
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK ditemukan!"
          ls -la app/build/outputs/apk/debug/
        else
          echo "APK TIDAK DITEMUKAN!"
          ls -la app/build/outputs/apk/ || echo "Folder apk tidak ada"
          exit 1
        fi

    - name: Upload APK sebagai artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error  # <-- Ini akan bikin workflow gagal kalau APK gak ada
